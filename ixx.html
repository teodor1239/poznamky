<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>AI Chat</title>

<style>
body {
    font-family: Arial;
    background: #0f172a;
    color: white;
    padding: 20px;
}

#chat {
    max-width: 600px;
    margin: auto;
}

.message {
    padding: 10px;
    margin: 10px 0;
    border-radius: 10px;
}

.user {
    background: #1e293b;
    text-align: right;
}

.ai {
    background: #334155;
}

input {
    width: 70%;
    padding: 10px;
}

button {
    padding: 10px;
}
</style>

</head>
<body>

<h1>Moje AI 🤖</h1>

<div id="chat"></div>

<input id="input" placeholder="Napiš zprávu..." />
<button onclick="send()">Odeslat</button>

<script>
async function send() {
    const input = document.getElementById("input");
    const message = input.value;

    if (!message) return;

    addMessage(message, "user");
    input.value = "";

    const res = await fetch("http://localhost:3000/chat", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ message })
    });

    const data = await res.json();

    addMessage(data.reply, "ai");
}

function addMessage(text, type) {
    const chat = document.getElementById("chat");

    const div = document.createElement("div");
    div.className = "message " + type;
    div.innerText = text;

    chat.appendChild(div);
}
</script>

</body>
</html>
